name: Deploy Hugo Site

on:
  push:
    branches:
      - main  # 只要你推送代码到 main 分支，云端就开始自动构建

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true        # 记得我们讨论过的，必须用 Extended 版

      - name: Build
        run: hugo --minify

      - name: Deploy to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: root
          TARGET: "/var/www/hugo-blog" # 确保这是你服务器上存放网页的绝对路径
          SOURCE: "public/"